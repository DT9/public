### Installer priority
d-i debian-installer/priority string critical

### Locale / keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i console-setup/ask_detect boolean false
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string unassigned-domain

### Account
d-i passwd/root-password-crypted password $6$brJtc5i.Bbtvpxkk$bOzo2Tep5QYo5duTxndBZseb/.zE8k5EcWkE2wAC8.tLto0/y3diSqo.j9MDvrRmlO5ZvZFUIwQkz0zphT1RP.
d-i passwd/make-user boolean true
d-i passwd/username string debian
d-i passwd/user-fullname string debian
d-i passwd/user-password-crypted password $6$JDYwf/ArBWmxDz1q$T6mP5B/lDSWVwEKeH8JVKu5qH8.aRtREQLLGF8BzG/bXcETRbPqquSdYidKeSrmpvWGAVmLjNnZAvGcK6rGzm0

# Target disk for installation
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/nvme1n1
d-i partman-auto/purge_lvm_from_device boolean true
d-i partman-lvm/device_remove_lvm_span boolean true
d-i partman-auto/choose_recipe select proxmox-lvm
#   512M EFI, 1G /boot, 8G swap*, 96G / (root LV), remainder initially mounted at /var/lib/vz,
#   then converted to LVM-thin during late_command
#   *swap LV size can be adjusted later by the Proxmox role/Ansible if desired
d-i partman-auto/expert_recipe string                         \
      proxmox-lvm ::                                          \
        5 5 5 free                                      \
          $bios_boot{ }                           \
          method{ biosgrub }                      \
        .                                               \
        512 512 512 fat32                               \
          $primary{ }                             \
          method{ efi } format{ }                 \
          mountpoint{ /boot/efi }                 \
          label{ EFI }                            \
        .                                               \
        1024 1024 1024 ext4                             \
          $primary{ } $bootable{ }                \
          method{ format } format{ }              \
          use_filesystem{ } filesystem{ ext4 }    \
          mountpoint{ /boot }                     \
          label{ BOOT }                           \
        .                                               \
        2048 8192 8192 linux-swap                       \
          $lvmok{ }                               \
          lv_name{ swap }                         \
          vg_name{ pve }                          \
          method{ swap } format{ }                \
        .                                               \
        98304 98304 98304 ext4                          \
          $lvmok{ }                               \
          lv_name{ root }                         \
          vg_name{ pve }                          \
          method{ format } format{ }              \
          use_filesystem{ } filesystem{ ext4 }    \
          mountpoint{ / }                         \
          label{ ROOT }                           \
        .                                               \
        1024 1024 -1 ext4                              \
          $lvmok{ }                               \
          lv_name{ data }                         \
          vg_name{ pve }                          \
          method{ format } format{ }              \
          use_filesystem{ } filesystem{ ext4 }    \
          mountpoint{ /var/lib/vz }               \
          label{ DATA }                           \
        .                                               \
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string pve

# Clear the entire disk before partitioning
d-i partman-clear_device string /dev/nvme1n1
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-efi/non_efi_system boolean true
d-i partman/mount_style select uuid
d-i partman/early_command string wipefs -a /dev/nvme1n1 2>/dev/null || true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Bootloader installation on /dev/nvme1n1
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/nvme1n1
d-i grub-installer/choose_bootdev select /dev/nvme1n1
grub-pc grub-pc/install_devices multiselect /dev/nvme1n1
grub-pc grub-pc/install_devices_disks_changed boolean true

### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo openssh-server firmware-realtek
d-i pkgsel/upgrade select none

# B.4.12. Finishing up the installation
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true

### Late commands
d-i preseed/late_command string \
    in-target /bin/bash -c 'set -e; \
      install -d -m 700 /home/debian/.ssh /root/.ssh; \
      printf "%s\n" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA8cR0q4kvA/Br2ze27RYWETDfpxsbFJZogN5sW7OHhw" | tee /home/debian/.ssh/authorized_keys /root/.ssh/authorized_keys >/dev/null; \
      chown -R debian:debian /home/debian/.ssh; \
      chmod 600 /home/debian/.ssh/authorized_keys /root/.ssh/authorized_keys; \
      usermod -aG sudo debian; \
      passwd -l debian || true; \
      systemctl enable ssh; \
      sed -i -E "s/^#?PasswordAuthentication.*/PasswordAuthentication no/" /etc/ssh/sshd_config; \
      sed -i -E "s/^#?PermitRootLogin.*/PermitRootLogin prohibit-password/" /etc/ssh/sshd_config; \
      mkdir -p /var/lib/vz; \
      lvremove -y pve/data || true; \
      lvcreate -y -L 10G --type thin-pool -n vmstore pve; \
      lvextend -l +100%FREE pve/vmstore; \
      lvcreate -y -V 3.7T -T pve/vmstore -n vzthin; \
      mkfs.ext4 -F /dev/pve/vzthin; \
      echo "/dev/pve/vzthin /var/lib/vz ext4 defaults 0 2" >> /etc/fstab; \
      mount /var/lib/vz;'; \
    sync


